[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
private_voting = "4QtJkVtnkWuC49MV3ggQ3gFxLQY3be9KbEhAq8DdV7yx"

[programs.localnet]
private_voting = "4QtJkVtnkWuC49MV3ggQ3gFxLQY3be9KbEhAq8DdV7yx"

[registry]
url = "https://api.apr.dev"

[provider]
